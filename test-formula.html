<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LaTeX 公式渲染测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    .test-case {
      margin: 20px 0;
      padding: 15px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #f9f9f9;
    }
    .test-case h3 {
      margin-top: 0;
      color: #333;
    }
    .input {
      background: #fff;
      padding: 10px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 13px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .output {
      background: #fff;
      padding: 10px;
      border-radius: 4px;
      border-left: 3px solid #007acc;
    }
    .error {
      color: #cc0000;
      background: #ffe6e6;
      padding: 5px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>LaTeX 公式渲染测试</h1>
  
  <div id="test-cases"></div>

  <script type="module">
    import MarkdownIt from 'https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/+esm';
    import texmath from 'https://cdn.jsdelivr.net/npm/markdown-it-texmath@1.0.0/+esm';
    import katex from 'https://cdn.jsdelivr.net/npm/katex@0.16.9/+esm';

    const md = new MarkdownIt({
      breaks: true,
      linkify: true,
    });

    md.use(texmath, {
      engine: katex,
      delimiters: ['dollars', 'brackets'],
      throwOnError: false,
      errorColor: '#cc0000',
    });

    const testCases = [
      {
        name: '行内公式（带空格）',
        input: '对于长度为 $ n $、能纠正 $ t $ 个错误的二进制码，其最大码字数量 $ M $ 满足：',
      },
      {
        name: '行内公式（无空格）',
        input: '对于长度为$n$、能纠正$t$个错误的二进制码，其最大码字数量$M$满足：',
      },
      {
        name: '块级公式',
        input: '正弦的和差化积：\n\n$$\\sin A + \\sin B = 2 \\sin\\left(\\frac{A + B}{2}\\right) \\cos\\left(\\frac{A - B}{2}\\right)$$',
      },
      {
        name: '多个行内公式',
        input: '已知 $ x = 1 $ 和 $ y = 2 $，则 $ x + y = 3 $。',
      },
      {
        name: '混合公式',
        input: '当 $ n > 0 $ 时：\n\n$$E = mc^2$$\n\n其中 $ E $ 表示能量。',
      },
      {
        name: '未闭合公式（流式输出场景）',
        input: '这是一个未闭合的公式 $ x^2 + ',
      },
      {
        name: '复杂公式',
        input: '余弦的和差化积：\n\n$$\\cos A + \\cos B = 2 \\cos\\left(\\frac{A + B}{2}\\right) \\cos\\left(\\frac{A - B}{2}\\right)$$\n\n$$\\cos A - \\cos B = -2 \\sin\\left(\\frac{A + B}{2}\\right) \\sin\\left(\\frac{A - B}{2}\\right)$$',
      },
    ];

    const container = document.getElementById('test-cases');

    testCases.forEach((testCase, index) => {
      const div = document.createElement('div');
      div.className = 'test-case';
      
      const title = document.createElement('h3');
      title.textContent = `${index + 1}. ${testCase.name}`;
      div.appendChild(title);
      
      const inputDiv = document.createElement('div');
      inputDiv.className = 'input';
      inputDiv.textContent = testCase.input;
      div.appendChild(inputDiv);
      
      const outputDiv = document.createElement('div');
      outputDiv.className = 'output';
      outputDiv.innerHTML = md.render(testCase.input);
      div.appendChild(outputDiv);
      
      container.appendChild(div);
    });
  </script>
</body>
</html>
